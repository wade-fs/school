name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Secrets and Decode Keystore
        run: |
          missing=0
          echo "=== Debugging Secrets (checking length only) ==="
          if [ -z "${{ secrets.SIGNING_KEY_BASE64 }}" ]; then echo "Error: SIGNING_KEY_BASE64 is missing"; missing=1; else echo "SIGNING_KEY_BASE64 is present (length: ${#SECRET_KEY_B64})"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then echo "Error: KEY_ALIAS is missing"; missing=1; else echo "KEY_ALIAS is present"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then echo "Error: KEY_PASSWORD is missing"; missing=1; else echo "KEY_PASSWORD is present"; fi
          if [ -z "${{ secrets.STORE_PASSWORD }}" ]; then echo "Error: STORE_PASSWORD is missing"; missing=1; else echo "STORE_PASSWORD is present"; fi

          if [ $missing -eq 1 ]; then
            echo "::error::One or more secrets are missing. Please check GitHub Settings -> Secrets -> Actions."
            exit 1
          fi

          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks
          if [ $? -ne 0 ]; then
            echo "::error::Failed to decode SIGNING_KEY_BASE64. Ensure it is a valid base64 string."
            exit 1
          fi
          echo "Keystore decoded successfully."
        env:
          SECRET_KEY_B64: ${{ secrets.SIGNING_KEY_BASE64 }}

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          KEY_FILE: ${{ github.workspace }}/release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
